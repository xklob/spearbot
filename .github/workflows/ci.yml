name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spearbot-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: spearbot-node/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run audit:critical
